[package]
name = "sift-cli"
version.workspace = true
edition.workspace = true
description = "Grep-like CLI for sift-core"
readme = "README.md"
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[lints]
workspace = true

[[bin]]
name = "sift"
path = "src/main.rs"

[dependencies]
anyhow = "1"
bitflags = "2"
clap = { version = "4", features = ["derive"] }
ignore = "0.4"
rayon = "1"
sift-core = { path = "../core" }
