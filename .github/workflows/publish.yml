# On tag v*: publish sift-core to crates.io, build sift CLI binaries, upload to GitHub Release.
name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish_core:
    name: crates.io — sift-core ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TAG_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: verify tag version matches Cargo.toml
        run: |
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "//;s/"//')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match Cargo.toml version '$CARGO_VERSION'"
            exit 1
          fi
          echo "Version validated: $CARGO_VERSION"

      - name: cargo package (dry run)
        run: cargo package -p sift-core --allow-dirty
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

      - name: publish to crates.io
        run: cargo publish -p sift-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build_cli:
    name: CLI binary (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: sift-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: sift-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: sift-x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sift-x86_64-pc-windows-msvc.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: build
        run: cargo build --release -p sift-cli --target ${{ matrix.target }}

      - name: stage binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/sift.exe" "${{ matrix.asset_name }}"
          else
            cp "target/${{ matrix.target }}/release/sift" "${{ matrix.asset_name }}"
            strip "${{ matrix.asset_name }}" || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  github_release:
    name: GitHub Release — CLI assets
    needs: build_cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sift-*
          merge-multiple: true

      - run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
